<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="zxing-browser.min.js"></script>

    <script>
        var p = new URLSearchParams(location.search);
        var accent = '#' + (p.get('accent') || 'D97706');
        var card = '#' + (p.get('card') || 'F7F0E4');
        var sub = '#' + (p.get('sub') || '706050');
        var score_bg = '#' + (p.get('score_bg') || 'F0E2C8');
        var score_bdr = '#' + (p.get('score_border') || 'DEC070');
        var text_col = '#' + (p.get('text_col') || '1A1200');
        var glow = (p.get('glow') || 'rgba(217,119,6,0.16)');

        document.write(
            '<style>:root{' +
            '--accent:' + accent + ';' +
            '--card:' + card + ';' +
            '--sub:' + sub + ';' +
            '--score-bg:' + score_bg + ';' +
            '--score-bdr:' + score_bdr + ';' +
            '--text:' + text_col + ';' +
            '--glow:' + glow + ';' +
            '}</style>'
        );
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background: var(--card);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
        }

        #wrap {
            padding: 0;
            margin: 6px;
        }

        /* ── Button row ── */
        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 0;
        }

        .btn-row > * {
            flex: 1;
        }

        #btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 2px 10px var(--glow);
            transition: opacity .15s, transform .12s;
            letter-spacing: -0.01em;
        }

        #btn:active {
            opacity: .85;
            transform: scale(.99);
        }

        #upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            background: var(--card);
            color: var(--accent);
            border: 1.5px solid var(--accent);
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            border-radius: 10px;
            cursor: pointer;
            transition: background .15s, color .15s;
            letter-spacing: -0.01em;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #upload-label:hover {
            background: var(--accent);
            color: #fff;
        }

        #upload-label:active {
            opacity: .85;
            transform: scale(.99);
        }

        #file-input {
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
        }

        /* ── Camera modal overlay ── */
        #camera-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(20, 18, 14, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        #camera-modal.open {
            display: flex;
            padding: 24px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #vp {
            width: 100%;
            max-width: 440px;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            min-height: 260px;
            padding: 0;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06),
            0 24px 60px rgba(0, 0, 0, 0.5);
        }

        #vp video {
            width: 100% !important;
            height: 100% !important;
            padding: 0;
            display: block;
            object-fit: cover;
        }

        #vp canvas.drawingBuffer {
            display: none !important;
        }

        #modal-msg {
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.45);
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-top: 16px;
            text-align: center;
            min-height: 1.4em;
            transition: color 0.2s;
        }

        #progress {
            width: 100%;
            max-width: 440px;
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 99px;
            margin-top: 14px;
            display: none;
            overflow: hidden;
        }

        #progress > div {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 60%, white));
            border-radius: 99px;
            width: 0%;
            transition: width 0.25s ease;
            box-shadow: 0 0 8px var(--accent);
        }

        #stop {
            margin-top: 20px;
            padding: 11px 36px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            border-radius: 12px;
            letter-spacing: 0.01em;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
            backdrop-filter: blur(6px);
        }

        #stop:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.7);
            transform: translateY(-1px);
        }

        #stop:active {
            transform: translateY(0px);
            background: rgba(255, 255, 255, 0.07);
        }

        /* ── Result (shown in main wrap, below buttons) ── */
        #msg {
            font-size: 0.66rem;
            color: var(--sub);
            padding: 7px 0 0;
            text-align: center;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.03em;
            opacity: .75;
            min-height: 1.4em;
        }

        #found {
            display: none;
            margin-top: 9px;
            padding: 14px;
            background: var(--score-bg);
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--score-bdr);
        }

        #found-code {
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 700;
            margin-bottom: 11px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.06em;
        }

        #found-btn {
            display: inline-block;
            padding: 10px 22px;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 0.83rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            text-decoration: none;
            letter-spacing: -0.01em;
        }
    </style>
</head>
<body>

<div id="wrap">
    <div class="btn-row">
        <button id="btn" onclick="go()">📷 Scan camera</button>
        <label id="upload-label" for="file-input">Carica foto</label>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="scanFile(event)">
    <div id="msg">Inquadra il barcode o carica una foto</div>
    <div id="found">
        <div id="found-code"></div>
        <a id="found-btn" href="#" target="_top">Cerca Prodotto →</a>
    </div>
</div>

<!-- Camera modal -->
<div id="camera-modal">
    <div id="vp"></div>
    <div id="progress"><div></div></div>
    <div id="modal-msg">Inizializzazione fotocamera...</div>
    <button id="stop" onclick="halt()">✕ Chiudi</button>
</div>

<script>
    var running = false, done = false;
    var consensusBuf = [];
    var CONSENSUS_N = 2;

    // error  = string "err" ou "warning"
    function displayErrorConsole(error, type) {
        if (type === "warning") {
            console.warn(error);
        } else {
            console.error(error);
        }
    }

    function resize() {
        var h = document.getElementById('wrap').scrollHeight;
        window.parent.postMessage({type: 'streamlit:setFrameHeight', height: h + 4}, '*');
    }

    window.addEventListener('load', function () {
        setTimeout(resize, 50);
    });
    new MutationObserver(resize).observe(document.getElementById('wrap'), {
        subtree: true,
        childList: true,
        attributes: true
    });

    function setProgress(pct) {
        var pr = document.getElementById('progress');
        if (!pr || !pr.firstChild) return;
        pr.style.display = (pct > 0 && pct < 100) ? 'block' : 'none';
        pr.firstChild.style.width = pct + '%';
    }

    function isValidBarcode(code) {
        if (!code) return false;
        var s = String(code).replace(/\s/g, '');
        return /^[0-9]{8}$/.test(s) || /^[0-9]{12}$/.test(s) ||
            /^[0-9]{13}$/.test(s) || /^[0-9]{14}$/.test(s);
    }

    function confirmCode(code) {
        done = true;
        halt();
        setProgress(100);
        document.getElementById('msg').textContent = '✓ Rilevato: ' + code;
        document.getElementById('found-code').textContent = code;
        var target = window.top.location.pathname + '?barcode=' + encodeURIComponent(code);
        document.getElementById('found-btn').href = target;
        document.getElementById('found').style.display = 'block';
        resize();
        setTimeout(function () {
            window.top.location.href = target;
        }, 250);
    }

    function go() {
        done = false;
        consensusBuf = [];
        setProgress(0);
        document.getElementById('found').style.display = 'none';
        document.getElementById('modal-msg').textContent = 'Inizializzazione fotocamera...';

        document.getElementById('camera-modal').classList.add('open');

        Quagga.init({
            inputStream: {
                type: "LiveStream", target: document.getElementById('vp'),
                constraints: {
                    facingMode: "environment",
                    width: {min: 370, ideal: 1280},
                    height: {ideal: 720},
                    aspectRatio: 16 / 9
                }
            },
            decoder: {readers: ["ean_reader", "ean_8_reader", "upc_reader", "upc_e_reader", "code_128_reader"]},
            locate: true, numOfWorkers: 2, frequency: 10
        }, function (err) {
            if (err) {
                document.getElementById('modal-msg').textContent = 'Errore: ' + err;
                displayErrorConsole(err, "err");
                halt();
                return;
            }
            Quagga.start();
            running = true;
            document.getElementById('modal-msg').textContent = 'Inquadra il barcode...';
        });

        Quagga.onDetected(function (r) {
            if (done) return;
            var code = r.codeResult.code;
            if (!isValidBarcode(code)) return;
            consensusBuf.push(code);
            if (consensusBuf.length > CONSENSUS_N) consensusBuf.shift();
            setProgress(consensusBuf.length / CONSENSUS_N * 100);
            if (consensusBuf.length >= CONSENSUS_N && consensusBuf.every(function (c) {
                return c === consensusBuf[0];
            })) {
                confirmCode(consensusBuf[0]);
            }
        });
    }

    function halt() {
        if (running) {
            try {
                Quagga.stop();
            } catch (e) {
                displayErrorConsole(e, "err");
            }
            running = false;
        }
        document.getElementById('vp').innerHTML = '';
        document.getElementById('camera-modal').classList.remove('open');
        setProgress(0);
        resize();
    }

    /* ── Scan from image file ── */
    async function loadFileToCanvas(file, maxDim) {
        var bmp;
        try {
            bmp = await createImageBitmap(file, {imageOrientation: 'from-image'});
        } catch (e1) {
            displayErrorConsole(e1, "warning");
            try {
                bmp = await createImageBitmap(file);
            } catch (e2) {
                displayErrorConsole(e2, "warning");
                var dataUrl = await new Promise(function (res, rej) {
                    var fr = new FileReader();
                    fr.onload = function () { res(fr.result); };
                    fr.onerror = rej;
                    fr.readAsDataURL(file);
                });
                var img = new Image();
                await new Promise(function (res, rej) {
                    img.onload = res;
                    img.onerror = rej;
                    img.src = dataUrl;
                    setTimeout(function () {
                        rej(new Error('timeout'));
                    }, 8000);
                });
                bmp = img;
            }
        }
        var w = bmp.width || bmp.naturalWidth;
        var h = bmp.height || bmp.naturalHeight;
        var scale = Math.min(1, maxDim / Math.max(w, h));
        var cw = Math.max(1, Math.round(w * scale));
        var ch = Math.max(1, Math.round(h * scale));
        var canvas = document.createElement('canvas');
        canvas.width = cw;
        canvas.height = ch;
        canvas.getContext('2d').drawImage(bmp, 0, 0, cw, ch);
        if (bmp.close) try { bmp.close(); } catch (e) {}
        return canvas;
    }

    async function zxingDecodeRotated(srcCanvas, rotation) {
        var rotCanvas = srcCanvas;
        if (rotation !== 0) {
            var w = srcCanvas.width, h = srcCanvas.height;
            var rw = (rotation === 90 || rotation === 270) ? h : w;
            var rh = (rotation === 90 || rotation === 270) ? w : h;
            rotCanvas = document.createElement('canvas');
            rotCanvas.width = rw;
            rotCanvas.height = rh;
            var rctx = rotCanvas.getContext('2d');
            rctx.translate(rw / 2, rh / 2);
            rctx.rotate(rotation * Math.PI / 180);
            rctx.drawImage(srcCanvas, -w / 2, -h / 2);
        }
        var dataUrl = rotCanvas.toDataURL('image/png');
        var img = new Image();
        try {
            await new Promise(function (res, rej) {
                img.onload = res;
                img.onerror = rej;
                img.src = dataUrl;
                setTimeout(function () {
                    rej(new Error('img timeout'));
                }, 5000);
            });
        } catch (e) {
            displayErrorConsole(e, "err");
            throw e;
        }

        try {
            var reader = new window.ZXingBrowser.BrowserMultiFormatReader();
            return await reader.decodeFromImageElement(img);
        } catch (e) {
            displayErrorConsole(e, "warning");
            throw e;
        }
    }

    async function scanFile(ev) {
        var file = ev.target.files && ev.target.files[0];
        var msg = document.getElementById('msg');
        if (!file) {
            msg.textContent = 'Nessun file selezionato.';
            return;
        }
        done = false;
        consensusBuf = [];
        document.getElementById('found').style.display = 'none';
        msg.textContent = 'Caricamento (' + Math.round(file.size / 1024) + ' KB)...';
        resize();

        var canvas;
        try {
            canvas = await loadFileToCanvas(file, 1600);
            msg.textContent = 'Immagine ' + canvas.width + '×' + canvas.height + ', analisi barcode...';
        } catch (err) {
            msg.textContent = 'Errore caricamento foto: ' + (err.message || err);
            displayErrorConsole(err, "err");
            ev.target.value = '';
            resize();
            return;
        }

        if ('BarcodeDetector' in window) {
            try {
                var detector = new window.BarcodeDetector({
                    formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'itf']
                });
                var codes = await detector.detect(canvas);
                if (codes && codes.length && isValidBarcode(codes[0].rawValue)) {
                    confirmCode(codes[0].rawValue);
                    return;
                }
            } catch (e) {
                displayErrorConsole(e, "err");
            }
        }

        if (!window.ZXingBrowser) {
            msg.textContent = 'Loading ZXing...';
            resize();
            try {
                await new Promise(function (res) {
                    var attempts = 0;
                    var interval = setInterval(function () {
                        attempts++;
                        if (window.ZXingBrowser || attempts >= 50) {
                            clearInterval(interval);
                            res();
                        }
                    }, 100);
                });
            } catch (e) {
                displayErrorConsole(e, "err");
            }
        }

        if (window.ZXingBrowser) {
            var rotations = [0, 90, 180, 270];
            for (var i = 0; i < rotations.length; i++) {
                msg.textContent = 'Attempt ' + (i + 1) + '/4 (rotation ' + rotations[i] + '°)...';
                resize();
                try {
                    var result = await zxingDecodeRotated(canvas, rotations[i]);
                    if (result && isValidBarcode(result.getText())) {
                        confirmCode(result.getText());
                        return;
                    }
                } catch (e) {
                    displayErrorConsole(e, "warning");
                }
            }
        } else {
            msg.textContent = 'ZXing failed to load. Check your connection and reload.';
            ev.target.value = '';
            resize();
            return;
        }

        msg.textContent = 'Nessun barcode rilevato. Prova da più vicino, senza riflessi, con il barcode a fuoco.';
        ev.target.value = '';
        resize();
    }
</script>
</body>
</html>
